<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training & Quiz</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 900px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
    }

    h2 {
      margin-top: 0;
    }

    p {
      color: #555;
    }

    .video-wrapper {
      width: 100%;
      height: 400px;
      margin: 20px 0;
      border-radius: 10px;
      overflow: hidden;
      background: black;
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    button {
      padding: 14px 28px;
      font-size: 18px;
      background-color: #2c5364;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      max-width: 300px;
      transition: 0.3s;
      margin-top: 20px;
    }

    button:hover {
      background-color: #1a333d;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>📹 Safety Training Videos</h2>
  <p>Please watch the videos before starting the quiz.</p>

  <!-- VIDEO 1 -->
  <h3>Video 1</h3>
  <div class="video-wrapper">
    <iframe 
      src="https://dmostechnologies1-my.sharepoint.com/personal/izz_dmostechnologies_com/_layouts/15/embed.aspx?UniqueId=d226cc28-9c8e-41d4-8e8f-a845f5882025"
      allowfullscreen>
    </iframe>
  </div>

  <!-- VIDEO 2 -->
  <h3>Video 2</h3>
  <div class="video-wrapper">
    <iframe 
      src="https://dmostechnologies1-my.sharepoint.com/personal/izz_dmostechnologies_com/_layouts/15/embed.aspx?UniqueId=6c47e539-c4ef-46f3-923e-9a231fb6c17e""
      allowfullscreen>
    </iframe>
  </div>

  <!-- VIDEO 3 (Optional) -->
  <!--
  <h3>Video 3</h3>
  <div class="video-wrapper">
    <iframe src="YOUR_VIDEO_LINK_3" allowfullscreen></iframe>
  </div>
  -->

  <!-- BUTTON -->
  <button onclick="startQuiz()">
    Start Quiz
  </button>

</div>

<script>
function startQuiz() {
  const quizzes = [
    "https://forms.office.com/r/uErqVt007N",
    "https://forms.office.com/r/RhD58pX4cT",
    "https://forms.office.com/r/sqrfcftNuB",
    "https://forms.office.com/r/23XWLT84sN"
  ];

  const randomIndex = Math.floor(Math.random() * quizzes.length);
  window.location.href = quizzes[randomIndex];
}
</script>

</body>
</html>
