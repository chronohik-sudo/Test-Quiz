<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch Video & Start Quiz</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      text-align: center;
      width: 90%;
      max-width: 800px;
    }

    h2 {
      color: #333;
      margin-top: 0;
    }

    /* Responsive Video */
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0;
      overflow: hidden;
      margin: 20px 0;
      border-radius: 8px;
      background: black;
    }

    .video-wrapper video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Button */
    button {
      padding: 14px 28px;
      font-size: 18px;
      background-color: #2c5364;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: not-allowed;
      width: 100%;
      max-width: 300px;
      opacity: 0.6;
      transition: 0.3s;
    }

    button.enabled {
      cursor: pointer;
      opacity: 1;
    }

    button.enabled:hover {
      background-color: #1a333d;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>📹 DMOS Safety Video</h2>
    <p>Please watch the video completely before proceeding.</p>

    <div class="video-wrapper">
      <video id="trainingVideo" controls>
        <source src="training.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>

    <button id="startBtn" disabled>
      Start Quiz
    </button>
  </div>

  <script>
    const video = document.getElementById("trainingVideo");
    const button = document.getElementById("startBtn");

    // Enable button ONLY when video finishes
    video.addEventListener("ended", () => {
      button.disabled = false;
      button.classList.add("enabled");
    });

    // Random quiz redirect
    button.addEventListener("click", () => {
      const quizzes = [
        "https://forms.office.com/r/uErqVt007N",
        "https://forms.office.com/r/RhD58pX4cT",
        "https://forms.office.com/r/sqrfcftNuB",
        "https://forms.office.com/r/23XWLT84sN"
      ];

      const randomIndex = Math.floor(Math.random() * quizzes.length);
      const selectedQuiz = quizzes[randomIndex];

      window.location.href = selectedQuiz;
    });
  </script>

</body>
</html>
