<!DOCTYPE html>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background-color: white;
      padding: 30px;
      border-radius: 12px;

      width: 90%;

    h2 {

    /* Responsive Video */
.video-wrapper {
  width: 100%;
  max-width: 900px;
  height: 500px;
  margin: 20px auto;
  border-radius: 12px;
  overflow: hidden;
  background: black;
}

.video-wrapper iframe {
  width: 100%;
  height: 100%;
  border: none;
}

    /* Button */
    button {
      padding: 14px 28px;
      font-size: 18px;
      background-color: #2c5364;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: not-allowed;
      width: 100%;
      max-width: 300px;
      opacity: 0.6;
      transition: 0.3s;
    }

    button.enabled {
      cursor: pointer;
      opacity: 1;
    }

    button.enabled:hover {
      background-color: #1a333d;
    }
  </style>
</head>
